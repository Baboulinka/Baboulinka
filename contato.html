<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contato · Baboulinka</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="hero">
    <div class="hero-inner">
      <div class="topbar">
        <a href="index.html" class="brand">Baboulinka</a>
        <nav class="nav">
          <a href="blog.html">Blog</a>
          <a href="projetos.html">Projetos</a>
          <a href="musica.html">Música</a>
          <a href="contato.html" class="active">Contato</a>
        </nav>
      </div>
      <div class="page-head">
        <p class="kicker">Contato</p>
        <h1 class="page-title">Fale comigo</h1>
      </div>
    </div>
  </section>

  <main class="contato-wrap">
    <p class="contato-lead">Prefiro conversa direta. Sem formulário.</p>

    <div class="contato-list">

      <div>
        <p class="contato-label">Email</p>
        <!-- Troque pelo seu email real (mantenha o "mailto:") -->
        <a class="contato-link" href="mailto:seu-email@exemplo.com">seu-email@exemplo.com</a>
      </div>

      <div class="contato-rule"></div>

      <div>
        <p class="contato-label">WhatsApp</p>
        <!-- Troque pelo seu número: wa.me/55DDDNUMERO (só dígitos) -->
        <a class="contato-link" href="https://wa.me/5500000000000" target="_blank" rel="noopener">+55 (00) 00000-0000</a>
      </div>

    </div>

    <p class="contato-note">Edite este arquivo para inserir seu email e número reais — troque o <code>mailto:</code> e o link <code>wa.me</code>.</p>
  </main>

  <footer class="footer footer-narrow">
    Baboulinka · caderno de bancada
  </footer>

</body>
</html>
